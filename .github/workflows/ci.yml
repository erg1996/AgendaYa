name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Backend: build + test ─────────────────────────────────────────────────
  backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run tests
        run: dotnet test --no-build -c Release --logger "console;verbosity=normal"

  # ── Frontend: build (type-check + bundle) ─────────────────────────────────
  frontend:
    name: Frontend (React/Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (validates all imports resolve + no type errors)
        working-directory: frontend
        run: npm run build

  # ── Docker: verify images build correctly ─────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]    # only if code compiles

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t agendaya-api:ci .

      - name: Build frontend image
        run: docker build -t agendaya-frontend:ci ./frontend

      - name: Smoke test — API healthcheck
        run: |
          docker run -d --name api-smoke \
            -e ASPNETCORE_ENVIRONMENT=Development \
            -e ASPNETCORE_URLS=http://+:8080 \
            -p 8080:8080 \
            agendaya-api:ci
          sleep 10
          curl -fs http://localhost:8080/health || (docker logs api-smoke && exit 1)
          docker stop api-smoke
