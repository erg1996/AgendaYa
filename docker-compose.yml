services:
  api:
    build: .
    image: agendaya-api:latest
    container_name: agendaya-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      ConnectionStrings__DefaultConnection: ${DATABASE_URL:?DATABASE_URL is required}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:?FRONTEND_ORIGIN is required}
      PublicUrl__AppBaseUrl: ${PUBLIC_URL:?PUBLIC_URL is required}
    volumes:
      - agendaya-uploads:/app/wwwroot/uploads
      - agendaya-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  agendaya-uploads:
  agendaya-logs:
